[project]
name = "tenant-service"
version = "0.1.0"
description = "Tenant management service for Accounting Platform"
requires-python = ">=3.12"
dependencies = [
    "fastapi[standard]>=0.115.0",
    "pydantic>=2.10.0",
    "pydantic-settings>=2.7.0",
    "sqlalchemy[asyncio]>=2.0.36",
    "asyncpg>=0.30.0",
    "structlog>=24.4.0",
    "python-jose[cryptography]>=3.3.0",
    "alembic>=1.14.0",
    "shared-lib",
    "coa-service",
    "audit-service",
]

[tool.uv.sources]
shared-lib = { workspace = true }
coa-service = { workspace = true }
audit-service = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tenant_service"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "SIM"]

[tool.ruff.lint.per-file-ignores]
"src/**/deps.py" = ["B008"]
"src/**/interfaces/api/router.py" = ["B008"]
"tests/**" = ["E501", "I001", "PLC0415"]
