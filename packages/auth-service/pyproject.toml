[project]
name = "auth-service"
version = "0.1.0"
description = "Authentication and authorization service for the Accounting Platform"
requires-python = ">=3.12"
dependencies = [
    "fastapi[standard]",
    "pydantic",
    "pydantic-settings",
    "sqlalchemy[asyncio]",
    "asyncpg",
    "structlog",
    "python-jose",
    "httpx",
    "bcrypt>=4.2.0",
    "alembic",
    "shared-lib",
]

[project.optional-dependencies]
dev = [
    "aiosqlite",
    "pytest",
    "pytest-asyncio",
    "pytest-cov",
    "ruff",
    "black",
    "isort",
    "mypy",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "A", "C4", "SIM", "ARG", "PTH", "PL"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["PLR2004", "PLC0415"]
"src/**/deps.py" = ["B008"]
"src/**/interfaces/api/router.py" = ["B008"]
"src/**/application/services.py" = ["PLR2004"]
"src/**/interfaces/api/schemas.py" = ["PLR2004"]
"src/**/domain/value_objects.py" = ["PLR2004"]

[tool.ruff.format]
quote-style = "double"

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.isort]
profile = "black"
line_length = 100

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
disallow_untyped_defs = true
exclude = ["alembic/", "tests/"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
