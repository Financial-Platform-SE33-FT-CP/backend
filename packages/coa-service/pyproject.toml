[project]
name = "coa-service"
version = "0.1.0"
description = "Chart of Accounts Service - Accounting Platform"
requires-python = ">=3.12"
dependencies = [
    "fastapi[standard]>=0.115.0",
    "pydantic>=2.10.0",
    "pydantic-settings>=2.7.0",
    "sqlalchemy[asyncio]>=2.0.36",
    "asyncpg>=0.30.0",
    "structlog>=24.4.0",
    "httpx>=0.28.0",
    "python-jose[cryptography]>=3.3.0",
    "alembic>=1.14.0",
    "shared-lib",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/coa_service"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "SIM"]

[tool.ruff.lint.per-file-ignores]
"src/**/deps.py" = ["B008"]
"src/**/interfaces/api/router.py" = ["B008"]
"tests/**" = ["E501", "I001"]
