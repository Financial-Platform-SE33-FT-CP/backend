[project]
name = "coa-service"
version = "0.1.0"
description = "Chart of Accounts Service - Accounting Platform"
requires-python = ">=3.12"
dependencies = [
    "fastapi[standard]>=0.115.0",
    "pydantic>=2.10.0",
    "pydantic-settings>=2.7.0",
    "sqlalchemy[asyncio]>=2.0.36",
    "asyncpg>=0.30.0",
    "structlog>=24.4.0",
    "httpx>=0.28.0",
    "alembic>=1.14.0",
    "shared-lib",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
