name: CI - ledger-service

on:
  push:
    branches: [develop]
    paths:
      - "packages/ledger-service/**"
      - "packages/shared-lib/**"
      - "backend/pyproject.toml"
      - ".github/workflows/ci-ledger-service.yml"
  pull_request:
    paths:
      - "packages/ledger-service/**"
      - "packages/shared-lib/**"
      - "backend/pyproject.toml"
      - ".github/workflows/ci-ledger-service.yml"

jobs:
  lint-and-type:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"
          enable-cache: true

      - name: Sync dependencies
        working-directory: .
        run: uv sync --package ledger-service --group dev

      - name: Ruff check
        working-directory: .
        run: uv run --package ledger-service ruff check --select E,W,F --ignore E501,F401 packages/ledger-service/src

      - name: Ruff format check
        working-directory: .
        run: uv run --package ledger-service ruff format --check packages/ledger-service/src
        continue-on-error: true

      - name: Mypy
        working-directory: .
        run: uv run --package ledger-service mypy --ignore-missing-imports packages/ledger-service/src
        continue-on-error: true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-type
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"
          enable-cache: true

      - name: Sync dependencies
        working-directory: .
        run: uv sync --package ledger-service --group dev

      - name: Run unit tests
        working-directory: .
        run: |
          if [ -d "packages/ledger-service/tests/unit" ]; then
            uv run --package ledger-service pytest packages/ledger-service/tests/unit -v --cov=packages/ledger-service/src --cov-report=xml || [ $? -eq 5 ]
          else
            echo "No unit tests directory found, running all tests with coverage."
            uv run --package ledger-service pytest packages/ledger-service/tests -v --cov=packages/ledger-service/src --cov-report=xml || [ $? -eq 5 ]
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ledger-service
          path: coverage.xml
          retention-days: 7

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-type
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"
          enable-cache: true

      - name: Sync dependencies
        working-directory: .
        run: uv sync --package ledger-service --group dev

      - name: Run integration tests
        env:
          TESTCONTAINERS_RYUK_DISABLED: true
          TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock
        working-directory: .
        run: |
          if [ -d "packages/ledger-service/tests/integration" ]; then
            uv run --package ledger-service pytest packages/ledger-service/tests/integration -v || [ $? -eq 5 ]
          else
            echo "No integration tests directory found, skipping."
          fi
